simulation {

  # ----------------
  # Random Seed
  # ----------------
  seed = 12345

  # Neural Network Configuration
  model {
    features = ["X", "Y", "SquareX", "SquareY"]
    hidden-layers = [
      { neurons: 3, activation: "Relu" },
      { neurons: 2, activation: "Tanh" }
    ]
  }

  # Global Dataset Configuration
  dataset {
    size = 1000
    test-split = 0.4

    # --------------------------------
    # Spiral Dataset configuration
    # --------------------------------
    # type = "Spiral"
    # start-distance = 0.5
    # branch-distance = 4.0
    # rotation = 0.0

    # --------------------------------
    # Gaussian Dataset configuration
    # --------------------------------
    # type = "Gaussian"
    # distance = 15.0
    # sigma = 14
    # radius = 16.0
    # domain-min = -25.0
    # domain-max = 25.0

    # --------------------------------
    # Ring Dataset configuration
    # --------------------------------
    type = "Ring"
    center-x = 0.0
    center-y = 0.0
    inner-radius = 8.0
    outer-radius = 15.0
    thickness = 10.0
    domain-min = -25.0
    domain-max = 25.0

    # --------------------------------
    # XOR Dataset configuration
    # --------------------------------
    # type = "Xor"
    # domain-min = -25.0
    # domain-max = 25.0

  }

  # Training Configuration
  training {
    epochs = 70
    batch-size = 32

    # Hyperparameters
    hyper-params {
      learning-rate = 0.3

      regularization {

        # --------------------------------
        # ElasticNet configuration
        # --------------------------------
        type = "ElasticNet"
        l1_rate = 0.005
        l2_rate = 0.005

        # --------------------------------
        # L1 configuration
        # --------------------------------
        # type = "L2"
        # rate = 0.01

        # --------------------------------
        # L2 configuration
        # --------------------------------
        # type = "L2"
        # rate = 0.01
      }
    }
  }

}